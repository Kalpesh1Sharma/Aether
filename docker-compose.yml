version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
      POSTGRES_DB: aether
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aether:aether@postgres:5432/aether
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker-1:
    build: .
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://aether:aether@postgres:5432/aether
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WORKER_ID: worker-1
      WORKER_CONCURRENCY: 10
    depends_on:
      api:
        condition: service_healthy

  worker-2:
    build: .
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://aether:aether@postgres:5432/aether
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WORKER_ID: worker-2
      WORKER_CONCURRENCY: 10
    depends_on:
      api:
        condition: service_healthy

  worker-3:
    build: .
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://aether:aether@postgres:5432/aether
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WORKER_ID: worker-3
      WORKER_CONCURRENCY: 10
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
